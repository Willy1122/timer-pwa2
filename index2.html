<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>計時器</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
}

.container {
  text-align: center;
  width: 90%;
}

.display {
  font-size: 72px;
  margin: 40px 0;
  font-weight: bold;
}

button {
  width: 100%;
  padding: 18px;
  font-size: 20px;
  border: none;
  border-radius: 15px;
  margin: 10px 0;
  background: white;
  color: #007aff;
  font-weight: bold;
}

button:active {
  transform: scale(0.96);
}
</style>
</head>

<body>

<div class="container">
  <h1>計時器</h1>
  <div class="display" id="display">0</div>

  <button onclick="startLoop10()">循環 10 秒</button>
  <button onclick="start45()">45 秒倒數</button>
</div>

<script>
let timer = null;

// 🔊 播放提示音
function playBeep() {
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const oscillator = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();

  oscillator.type = "sine";
  oscillator.frequency.setValueAtTime(800, audioCtx.currentTime); // 音高
  gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime); // 音量

  oscillator.connect(gainNode);
  gainNode.connect(audioCtx.destination);

  oscillator.start();
  oscillator.stop(audioCtx.currentTime + 0.3); // 0.3 秒
}

// 🔁 10 秒循環
function startLoop10() {
  clearInterval(timer);
  let timeLeft = 10;
  const display = document.getElementById("display");
  display.textContent = timeLeft;

  timer = setInterval(() => {
    timeLeft--;
    if (timeLeft < 0) {
      playBeep();
      timeLeft = 10;
    }
    display.textContent = timeLeft;
  }, 1000);
}

// ⏱ 45 秒一次
function start45() {
  clearInterval(timer);
  let timeLeft = 45;
  const display = document.getElementById("display");
  display.textContent = timeLeft;

  timer = setInterval(() => {
    timeLeft--;
    display.textContent = timeLeft;

    if (timeLeft <= 0) {
      clearInterval(timer);
      playBeep();
      display.textContent = "時間到！";
    }
  }, 1000);
}
</script>

</body>
</html>
